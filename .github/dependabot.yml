version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      production-minor-patch:
        applies-to: version-updates
        update-types: [minor, patch]
    labels: ["Infrastructure", "P3-Low"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["Infrastructure"]
    commit-message:
      prefix: "chore(ci)"
# For Swift Package Manager repos (PepTrack iOS, RewardEd), add:
#   - package-ecosystem: swift
#     directory: "/"
#     schedule: { interval: weekly }
