# PR hygiene gate — Conventional Commit title + size warning. Drop into <repo>/.github/workflows/pr-validation.yml.
name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  title:
    name: Conventional title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title || "";
            const re = /^(feat|fix|perf|refactor|sec|chore|docs|test|build|ci)(\([a-z0-9\-_/]+\))?!?:\s.+/;
            if (!re.test(title)) {
              core.setFailed(`PR title must follow Conventional Commits, e.g. "feat(talnt): self-serve checkout". Got: "${title}"`);
            }
  size:
    name: Size warning
    runs-on: ubuntu-latest
    steps:
      - name: Warn on large PRs
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const changes = (pr.additions || 0) + (pr.deletions || 0);
            if (changes > 800) {
              core.warning(`This PR changes ${changes} lines. Target < 400 (see docs/engineering-standards.md). Consider splitting.`);
            }
